<body>
    <h1><mark>INTEGRAÇÃO JS COM FORMS</mark> DO HTML</h1>
    <br>
    <input type="button"onclick="tristeza()" value="Feliz">
    <input type="button"onclick="Feliz()" value="Triste">
    <img src="img/download (1).jpg" id="Rosto" style="" width="350px">
    <script>
        function tristeza() {
            let img = document.getElementById("Rosto");
            img.src = "img/emoticon-1610573_1280.png";
        }

        function Feliz() {
            let img = document.getElementById("Rosto");
            img.src = "img/download (1).jpg";
        }
    </script>
