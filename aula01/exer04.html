<body>
    <h1>Ola Mundo em JS: <mark>Alert</mark></h1>
    <br>
    <script>
        window.alert("Seja bem vindo ao meu site");
        let nome = window.prompt("Qual é seu nome?");
        console.log(nome);
        let resposta = window.confirm("Voce deseja sair da pagina?");
        console.log(resposta);
        if(resposta == true){
        window.console.log("VOCE ESTA PRESTES A SAIR DO SITE!!!");
        setTimeout(() => {
            window.close();
        }, 3000);

        }else{
             window.alert("Aproveite meu site, " + nome);
        }

    </script>
