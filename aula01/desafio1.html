        let n2 = window.prompt("Digite o segundo número:");

        let resposta = window.prompt("Digite a operação desejada: soma ou subtracao");
        console.log(resposta);
        if(resposta == "soma"){
            operacao = 'soma';
        }else if(resposta == "subtracao"){
